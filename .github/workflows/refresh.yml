name: Weekly data refresh

# Thursdays 12:00 UTC: after Redfin's midweek weekly-tracker update; Zillow's
# monthly files land mid-month and get picked up on the next run.
on:
  schedule:
    - cron: '0 12 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Run pipeline (download → scores → pulse → validate)
        working-directory: pipeline
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python run.py
      - name: Commit refreshed data
        id: commit
        run: |
          git add web/public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes this week."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Data refresh: $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
